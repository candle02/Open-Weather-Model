apiVersion: v1
kind: Service
metadata:
  name: weather-forecast
  namespace: weather-forecast
  labels:
    app: weather-forecast
spec:
  type: ClusterIP
  selector:
    app: weather-forecast
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
---
